    const favicons = [
      'alvaro.png',
      'eduardo.png',
      'paulo.png',
'ricardo.png',
    ];

    function getFaviconDoDia() {
      const dataAtual = new Date();
      const diaDoAno = Math.floor((dataAtual - new Date(dataAtual.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
      return favicons[diaDoAno % favicons.length];
    }

    document.getElementById('favicon').href = getFaviconDoDia();
  </script>
